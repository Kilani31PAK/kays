
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKM Broadcasting Network Overlay</title>
<link rel="stylesheet" href="overlay.css">
</head>
<body>
  <!-- Coming Soon Overlay -->
  <div id="comingSoon">
    <img src="assets/akm-logo.png" alt="AKM Logo" class="logo">
    <div class="coming-text">Coming Soon...</div>
    <audio id="introAudio" src="assets/Orchestral Swell 01_256k.mp3"></audio>
  </div>

  <!-- Camera Scene -->
  <div id="scene7">
    <iframe src="https://vdo.ninja/?view=YOURCAMID"
            width="640" height="360"
            frameborder="0"
            allow="camera; microphone"
            allowfullscreen>
    </iframe>
  </div>

<script>
  function showComingSoon() {
    const overlay = document.getElementById('comingSoon');
    const audio = document.getElementById('introAudio');
    overlay.style.display = 'flex';
    overlay.style.animation = 'fadeIn 2s forwards';
    audio.volume = 0;
    audio.play();
    let fadeIn = setInterval(() => {
      if (audio.volume < 1) audio.volume += 0.05;
      else clearInterval(fadeIn);
    }, 200);
    setTimeout(() => hideComingSoon(), 8000); // auto-hide after 8s
  }

  function hideComingSoon() {
    const overlay = document.getElementById('comingSoon');
    const audio = document.getElementById('introAudio');
    overlay.style.animation = 'fadeOut 2s forwards';
    setTimeout(() => overlay.style.display = 'none', 2000);
    let fadeOut = setInterval(() => {
      if (audio.volume > 0) audio.volume -= 0.05;
      else { clearInterval(fadeOut); audio.pause(); }
    }, 200);
  }

  // Trigger overlay on load
  window.onload = showComingSoon;
</script>
</body>
</html>
