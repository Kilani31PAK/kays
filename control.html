<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Overlay Control</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>GloryMinistry Control Panel</h2>

<!-- TICKER -->
<input id="tickerInput" placeholder="Ticker text" style="width:100%; font-size:18px;">
<button onclick="sendTicker()">Update Ticker</button>

<!-- LOWER THIRD -->
<br><br>
<input id="lowerthirdInput" placeholder="Lower Third" style="width:100%; font-size:18px;">
<button onclick="sendLowerthird()">Show Lower Third</button>

<!-- SCRIPTURE -->
<br><br>
<input id="scriptureInput" placeholder="Scripture" style="width:100%; font-size:18px;">
<button onclick="sendScripture()">Update Scripture</button>

<!-- CAMERA -->
<br><br>
<input id="cameraInput" placeholder="Camera URL" style="width:100%; font-size:18px;">
<button onclick="sendCamera()">Load Camera</button>

<!-- SCENES -->
<br><br>
<button onclick="switchScene('scene1')">Scene 1</button>
<button onclick="switchScene('scene2')">Scene 2</button>

<!-- LIVE -->
<br><br>
<button onclick="toggleLive(true)">LIVE ON</button>
<button onclick="toggleLive(false)">LIVE OFF</button>

<script>
function sendTicker() {
    window.opener.postMessage({ type: "ticker", text: tickerInput.value }, "*");
}

function sendLowerthird() {
    window.opener.postMessage({ type: "lowerthird", text: lowerthirdInput.value }, "*");
}

function sendScripture() {
    window.opener.postMessage({ type: "scripture", text: scriptureInput.value }, "*");
}

function sendCamera() {
    window.opener.postMessage({ type: "camera", url: cameraInput.value }, "*");
}

function switchScene(scene) {
    window.opener.postMessage({ type: "scene", scene: scene }, "*");
}

function toggleLive(state) {
    window.opener.postMessage({ type: "live", state: state }, "*");
}
</script>

</body>
</html>
