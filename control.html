<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
    }

    /* VIDEO MONITOR (TOP HALF) */
    #monitor {
        width: 100%;
        height: 45vh; /* almost half screen */
        background: black;
        border-bottom: 2px solid #444;
    }

    #monitor iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* CONTROL SECTION */
    .section {
        padding: 10px;
        border-bottom: 1px solid #333;
    }

    .section h2 {
        margin: 0 0 10px 0;
        font-size: 18px;
        color: #f1c40f;
    }

    button {
        width: 100%;
        padding: 12px;
        margin: 5px 0;
        background: #222;
        color: white;
        border: 1px solid #555;
        border-radius: 5px;
        font-size: 16px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        border-radius: 5px;
        border: none;
        font-size: 16px;
    }
</style>

</head>
<body>

<!-- VIDEO MONITOR -->
<div id="monitor">
    <iframe src="https://vdo.ninja/?view=azizcam"></iframe>
</div>

<!-- SCENE CONTROLS -->
<div class="section">
    <h2>Scenes</h2>
    <button onclick="send('scene1')">Scene 1</button>
    <button onclick="send('scene2')">Scene 2</button>
</div>

<!-- TICKER -->
<div class="section">
    <h2>Ticker</h2>
    <input id="tickerText" placeholder="Enter ticker text">
    <button onclick="updateTicker()">Update Ticker</button>
</div>

<!-- LOWER THIRD -->
<div class="section">
    <h2>Lower Third</h2>
    <input id="lowerText" placeholder="Enter lower third text">
    <button onclick="updateLower()">Update Lower Third</button>
</div>

<!-- SCRIPTURE -->
<div class="section">
    <h2>Scripture</h2>
    <textarea id="scriptureText" rows="3" placeholder="Enter scripture"></textarea>
    <button onclick="updateScripture()">Update Scripture</button>
</div>

<!-- AUDIO -->
<div class="section">
    <h2>Audio</h2>
    <button onclick="send('playAudio')">Play Background</button>
    <button onclick="send('stopAudio')">Stop Background</button>
</div>

<script>
function send(action, value = null) {
    window.parent.postMessage({ action, value }, "*");
}

function updateTicker() {
    const text = document.getElementById("tickerText").value;
    send("updateTicker", text);
}

function updateLower() {
    const text = document.getElementById("lowerText").value;
    send("updateLower", text);
}

function updateScripture() {
    const text = document.getElementById("scriptureText").value;
    send("updateScripture", text);
}
</script>

</body>
</html>
