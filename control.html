<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKM Control Panel</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    button {
        padding: 12px 18px;
        margin: 6px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: gold;
        color: black;
        font-weight: bold;
    }
</style>
</head>
<body>

<h2>Background Sound Control</h2>

<button onclick="sendBg(0.15)">BG 15%</button>
<button onclick="sendBg(0.35)">BG 35%</button>
<button onclick="sendBg(0.65)">BG 65%</button>
<button onclick="stopBg()">Stop BG</button>

<script>
function sendBg(level) {
    window.parent.postMessage({ action: "playBg", level: level }, "*");
}

function stopBg() {
    window.parent.postMessage({ action: "stopBg" }, "*");
}
</script>

</body>
</html>
