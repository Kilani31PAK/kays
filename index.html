<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKM Broadcast Overlay</title>
<style>
  /* Coming Soon Overlay */
  #comingSoon {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
    opacity:0;
    transition: opacity 2s ease; /* fade effect */
  }
  .coming-container { text-align:center; }
  .logo {
    width:300px;
    filter: drop-shadow(0 0 20px gold);
    animation: glow 3s infinite alternate;
  }
  .coming-text {
    color: gold;
    font-size: 36px;
    margin-top: 20px;
    text-shadow: 0 0 10px gold, 0 0 20px #ffd700, 0 0 30px #fff;
    animation: shimmer 4s infinite;
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 10px gold); }
    to { filter: drop-shadow(0 0 30px gold); }
  }
  @keyframes shimmer {
    0% { opacity:0.7; }
    50% { opacity:1; }
    100% { opacity:0.7; }
  }

  /* VDO.Ninja Viewer Embed */
  iframe {
    width:1280px;
    height:720px;
    border:none;
  }
</style>
</head>
<body>

<!-- VDO.Ninja Viewer Embed -->
<iframe 
  src="https://vdo.ninja/?view=AKMStream
  &quality=0
  &codec=h264
  &proaudio
  &stereo=1
  &audiobitrate=256
  &samplerate=48000
  &channels=2
  &cleanoutput
  &novideo=0"
  allow="camera; microphone; fullscreen"
  allowfullscreen>
</iframe>

<!-- Coming Soon Overlay -->
<div id="comingSoon">
  <div class="coming-container">
    <img src="assets/akm-logo.png" alt="AKM Logo" class="logo">
    <h1 class="coming-text">First Broadcast – Coming Soon</h1>
  </div>
</div>

<!-- Royal Intro Sound -->
<audio id="introSound" src="assets/Orchestral Swell 01_256k.mp3" preload="auto"></audio>

<!-- Control Buttons -->
<button onclick="showComingSoon()">Show Coming Soon</button>
<button onclick="hideComingSoon()">Hide Coming Soon</button>

<script>
  function fadeIn(audio, duration = 2000) {
    audio.volume = 0;
    audio.play();
    let step = 0.05;
    let interval = setInterval(() => {
      if (audio.volume < 1) {
        audio.volume = Math.min(1, audio.volume + step);
      } else {
        clearInterval(interval);
      }
    }, duration * step);
  }

  function fadeOut(audio, duration = 2000) {
    let step = 0.05;
    let interval = setInterval(() => {
      if (audio.volume > 0) {
        audio.volume = Math.max(0, audio.volume - step);
      } else {
        clearInterval(interval);
        audio.pause();
      }
    }, duration * step);
  }

  function showComingSoon() {
    const overlay = document.getElementById('comingSoon');
    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.opacity = 1; }, 50); // fade in overlay

    const sound = document.getElementById('introSound');
    sound.currentTime = 0; // restart from beginning
    fadeIn(sound, 2000);   // fade in audio
  }

  function hideComingSoon() {
    const overlay = document.getElementById('comingSoon');
    overlay.style.opacity = 0; // fade out overlay
    setTimeout(() => { overlay.style.display = 'none'; }, 2000);

    const sound = document.getElementById('introSound');
    fadeOut(sound, 2000);  // fade out audio
  }
</script>

</body>
</html>
