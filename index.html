<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GloryMinistry Overlay</title>
    <link rel="stylesheet" href="Overlay.css">
</head>

<body>

<!-- CAMERA FEED -->
<iframe id="cameraFrame" src="" allow="camera; microphone"></iframe>

<!-- LOGO -->
<img id="logo" src="logo.png">

<!-- LIVE BADGE -->
<div id="liveBadge">LIVE</div>

<!-- LOWER THIRD -->
<div id="lowerthird">
    <div id="lowerthird-text"></div>
</div>

<!-- SCRIPTURE -->
<div id="scripture">
    <div id="scripture-text"></div>
</div>

<!-- TICKER -->
<div id="ticker">
    <div id="ticker-content"></div>
</div>

<!-- SCENES -->
<div id="scene1" class="scene active"></div>
<div id="scene2" class="scene"></div>

<script>
window.addEventListener("message", (event) => {
    const data = event.data;

    if (data.type === "ticker") {
        document.getElementById("ticker-content").innerText = data.text;
    }

    if (data.type === "lowerthird") {
        const lt = document.getElementById("lowerthird");
        document.getElementById("lowerthird-text").innerText = data.text;
        lt.classList.add("show");
        setTimeout(() => lt.classList.remove("show"), 8000);
    }

    if (data.type === "scripture") {
        document.getElementById("scripture-text").innerText = data.text;
    }

    if (data.type === "camera") {
        document.getElementById("cameraFrame").src = data.url;
    }

    if (data.type === "scene") {
        document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
        document.getElementById(data.scene).classList.add("active");
    }

    if (data.type === "live") {
        document.getElementById("liveBadge").style.display = data.state ? "block" : "none";
    }
});
</script>

</body>
</html>
