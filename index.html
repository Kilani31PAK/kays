<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glory Ministry Overlay</title>
    <link rel="stylesheet" href="overlay.css">
</head>

<body>

    <!-- LOGO (Top Left) -->
    <img id="logo" src="logo.png" alt="Logo">

    <!-- SCENE 1 -->
    <div id="scene1" class="scene active">
        <iframe id="camera1" class="camera-full" src="" allow="camera; microphone"></iframe>

        <!-- Lower Third -->
        <div id="lowerthird" class="lowerthird"></div>

        <!-- Ticker -->
        <div id="ticker-container">
            <div id="ticker"></div>
        </div>
    </div>

    <!-- SCENE 2 -->
    <div id="scene2" class="scene">
        <div class="scene2-layout">

            <!-- Camera Left -->
            <iframe id="camera2" class="camera-left" src="" allow="camera; microphone"></iframe>

            <!-- Scripture Right -->
            <div id="scripture" class="scripture"></div>
        </div>

        <!-- Lower Third -->
        <div id="lowerthird2" class="lowerthird"></div>

        <!-- Ticker -->
        <div id="ticker-container2">
            <div id="ticker2"></div>
        </div>
    </div>

    <script>
        // Receive messages from control panel
        window.addEventListener("message", (event) => {
            const data = event.data;

            if (data.type === "lowerthird") {
                document.getElementById("lowerthird").innerText = data.text;
                document.getElementById("lowerthird2").innerText = data.text;
            }

            if (data.type === "ticker") {
                document.getElementById("ticker").innerText = data.text;
                document.getElementById("ticker2").innerText = data.text;
            }

            if (data.type === "scripture") {
                document.getElementById("scripture").innerHTML = data.text;
            }

            if (data.type === "scene") {
                document.getElementById("scene1").classList.remove("active");
                document.getElementById("scene2").classList.remove("active");

                document.getElementById(data.scene).classList.add("active");
            }

            if (data.type === "camera") {
                document.getElementById("camera1").src = data.url;
                document.getElementById("camera2").src = data.url;
            }
        });
    </script>

</body>
</html>
