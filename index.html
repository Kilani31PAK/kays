<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKM Overlay</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

<!-- BACKGROUND SOUND -->
<audio id="bgSound" src="assets/background.mp3" loop preload="auto"></audio>

<script>
window.addEventListener("message", (event) => {
    const audio = document.getElementById("bgSound");

    if (event.data.action === "playBg") {
        audio.volume = event.data.level;
        audio.play();
    }

    if (event.data.action === "stopBg") {
        audio.pause();
        audio.currentTime = 0;
    }
});
</script>

</body>
</html>
