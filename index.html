<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GloryMinistry Overlay</title>
    <link rel="stylesheet" href="Overlay.css">
</head>

<body>

<!-- GLOBAL ELEMENTS (always visible) -->
<img id="logo" src="logo.png">
<div id="liveBadge">LIVE</div>

<!-- TICKER -->
<div id="ticker">
    <div id="ticker-content"></div>
</div>

<!-- SCENE 1 -->
<div id="scene1" class="scene active">

    <!-- CAMERA -->
    <iframe id="cameraFrame" class="camera" src="" allow="camera; microphone"></iframe>

    <!-- LOWER THIRD -->
    <div id="lowerthird">
        <div id="lowerthird-text"></div>
    </div>

    <!-- SCRIPTURE -->
    <div id="scripture">
        <div id="scripture-text"></div>
    </div>

</div>

<!-- SCENE 2 -->
<div id="scene2" class="scene">

    <!-- CAMERA (optional for scene 2) -->
    <iframe id="cameraFrame2" class="camera" src="" allow="camera; microphone"></iframe>

    <!-- SCRIPTURE (bigger panel for scene 2) -->
    <div id="scripture2" class="scripture-panel">
        <div id="scripture2-text"></div>
    </div>

</div>

<script>
window.addEventListener("message", (event) => {
    const data = event.data;

    // TICKER
    if (data.type === "ticker") {
        document.getElementById("ticker-content").innerText = data.text;
    }

    // LOWER THIRD
    if (data.type === "lowerthird") {
        const lt = document.getElementById("lowerthird");
        document.getElementById("lowerthird-text").innerText = data.text;
        lt.classList.add("show");
        setTimeout(() => lt.classList.remove("show"), 8000);
    }

    // SCRIPTURE (Scene 1)
    if (data.type === "scripture") {
        document.getElementById("scripture-text").innerText = data.text;
        document.getElementById("scripture2-text").innerText = data.text;
    }

    // CAMERA FEED (both scenes)
    if (data.type === "camera") {
        document.getElementById("cameraFrame").src = data.url;
        document.getElementById("cameraFrame2").src = data.url;
    }

    // SCENE SWITCH
    if (data.type === "scene") {
        document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
        document.getElementById(data.scene).classList.add("active");
    }

    // LIVE BADGE
    if (data.type === "live") {
        document.getElementById("liveBadge").style.display = data.state ? "block" : "none";
    }
});
</script>

</body>
</html>
