<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Overlay Output</title>
  <link rel="stylesheet" href="overlay.css">
</head>

<body>
<div class="overlay-root">

  <!-- QUARTER SCREEN MONITOR -->
  <div class="monitor-quarter">
    <iframe id="monitorFeed" src="https://vdo.ninja/?view=AKMStream
&quality=0
&codec=h264
&proaudio
&stereo=1
&audiobitrate=256
&samplerate=48000
&channels=2
&cleanoutput
&novideo=0
&autoplay=1" frameborder="0"></iframe>
  </div>

  <!-- LIVE BUG -->
  <div id="liveBug" class="live-bug" style="display:none;">
    <div class="live-dot"></div> LIVE
  </div>

  <!-- LOWER THIRD -->
  <div id="lowerthird" class="lowerthird" style="display:none;">
    <div id="lt-title" class="lowerthird-title"></div>
    <div id="lt-sub" class="lowerthird-subtitle"></div>
  </div>

  <!-- TICKER -->
  <div id="ticker" class="ticker-bar" style="display:none;">
    <div class="ticker-label">NEWS</div>
    <div class="ticker-track">
      <div id="tickerText" class="ticker-text"></div>
    </div>
  </div>

</div>

<script>
/* WebSocket Receiver */
const ws = new WebSocket("ws://localhost:8080");

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);

  if (msg.type === "live") {
    document.getElementById("liveBug").style.display = msg.state ? "flex" : "none";
  }

  if (msg.type === "lowerthird") {
    if (msg.state) {
      document.getElementById("lowerthird").style.display = "flex";
      document.getElementById("lt-title").innerText = msg.title;
      document.getElementById("lt-sub").innerText = msg.subtitle;
    } else {
      document.getElementById("lowerthird").style.display = "none";
    }
  }

  if (msg.type === "ticker") {
    if (msg.state) {
      document.getElementById("ticker").style.display = "flex";
      document.getElementById("tickerText").innerText = msg.text;
    } else {
      document.getElementById("ticker").style.display = "none";
    }
  }

  if (msg.type === "monitor") {
    document.getElementById("monitorFeed").src = msg.url;
  }
};
</script>

</body>
</html>
